<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:ital,wght@1,800;1,900&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
.card{position:relative;width:1080px;height:1080px;background:#06070A;overflow:hidden;font-family:'Manrope',sans-serif;}
.sun{position:absolute;left:-160px;bottom:-160px;width:640px;height:640px;border-radius:50%;background:radial-gradient(circle,rgba(255,150,60,.85),rgba(255,110,30,.35) 32%,transparent 64%);}
.player{position:absolute;right:-40px;bottom:0;height:104%;-webkit-mask-image:linear-gradient(85deg,transparent 6%,#000 46%);mask-image:linear-gradient(85deg,transparent 6%,#000 46%);}
.grade{position:absolute;inset:0;background:linear-gradient(90deg,#06070A 16%,rgba(6,7,10,.5) 42%,transparent 66%),linear-gradient(0deg,#06070A 4%,transparent 40%);}
.inner{position:absolute;inset:0;padding:78px;display:flex;flex-direction:column;}
.top{display:flex;justify-content:space-between;align-items:center;}
.brand{display:flex;align-items:center;gap:18px;}
.ftlogo{width:76px;height:76px;}
.ftlogo path{fill:#FAFAF7;}
.word{font-family:'Saira Condensed';font-weight:900;font-style:italic;font-size:38px;color:#FAFAF7;text-transform:uppercase;}
.pill{font-family:'Saira Condensed';font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.1em;font-size:24px;padding:10px 22px;border-radius:999px;border:2px solid rgba(255,255,255,.15);color:#fff;}
.body{margin-top:auto;max-width:80%;}
.eyebrow{font-family:'Saira Condensed';font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.14em;font-size:30px;color:#28D7C6;margin-bottom:12px;}
.stat{font-family:'Saira Condensed';font-weight:900;font-style:italic;font-size:240px;line-height:.74;color:#FAFAF7;text-shadow:0 6px 50px rgba(255,126,31,.3);}
.stat .u{font-size:80px;color:#FFA94D;margin-left:12px;}
.headline{font-family:'Saira Condensed';font-weight:900;font-style:italic;text-transform:uppercase;font-size:58px;line-height:.92;color:#FAFAF7;margin-top:14px;}
.headline .hl{color:#FF7E1F;}
.footer{margin-top:40px;padding-top:26px;border-top:1px solid rgba(255,255,255,.1);display:flex;justify-content:space-between;align-items:center;}
.name{font-family:'Saira Condensed';font-weight:900;font-style:italic;text-transform:uppercase;font-size:30px;color:#fff;}
.name small{display:block;font-family:'Manrope';font-weight:600;font-style:normal;font-size:16px;color:#9AA0AD;text-transform:none;margin-top:2px;}
.cta{font-family:'Saira Condensed';font-weight:900;font-style:italic;text-transform:uppercase;font-size:30px;color:#06070A;background:#FFC53D;padding:16px 30px;border-radius:15px;white-space:nowrap;}
</style></head><body>
<div class="card">
  <div class="sun"></div>
  <img class="player" src="__PLAYERURL__">
  <div class="grade"></div>
  <div class="inner">
    <div class="top">
      <div class="brand"><svg viewBox="0 0 461 461" class="ftlogo"><path d="M 230.5 149.1875 C 216.046875 149.1875 203.074219 154.453125 194.183594 162.808594 L 266.816406 162.808594 C 257.925781 154.453125 244.953125 149.1875 230.5 149.1875 "/><path d="M 312.730469 207.875 C 308.441406 194.074219 299.558594 183.25 288.941406 177.238281 L 310.507812 246.597656 C 315.847656 235.628906 317.023438 221.675781 312.730469 207.875 "/><path d="M 148.269531 207.875 C 143.976562 221.675781 145.152344 235.628906 150.492188 246.597656 L 172.054688 177.238281 C 161.441406 183.25 152.558594 194.074219 148.269531 207.875 "/><path d="M 178.738281 301.554688 C 190.546875 309.890625 204.183594 313.070312 216.261719 311.371094 L 156.917969 269.488281 C 159.367188 281.4375 166.929688 293.222656 178.738281 301.554688 "/><path d="M 282.261719 301.554688 C 294.070312 293.222656 301.632812 281.4375 304.082031 269.488281 L 244.734375 311.371094 C 256.816406 313.070312 270.453125 309.890625 282.261719 301.554688 "/><path d="M 273.738281 238.3125 L 281.429688 218.21875 L 221.75 218.839844 C 222.050781 218.089844 222.34375 217.351562 222.617188 216.652344 C 222.925781 215.867188 223.183594 215.164062 223.386719 214.546875 C 223.59375 213.933594 223.730469 213.558594 223.800781 213.417969 L 252.429688 213.417969 L 260.230469 193.410156 L 206.148438 193.410156 L 198.863281 211.984375 L 183.160156 252.722656 L 208.917969 252.722656 C 209.054688 252.378906 209.382812 251.542969 209.894531 250.207031 C 210.40625 248.875 211.023438 247.234375 211.742188 245.285156 C 212.445312 243.367188 213.238281 241.246094 214.109375 238.933594 L 241.414062 238.648438 L 227.089844 242.796875 L 213.601562 278.242188 L 239.359375 277.976562 L 254.34375 238.515625 Z M 273.738281 238.3125 "/></svg><div class="word">Fantasy Tier</div></div>
      <div class="pill">FACT</div>
    </div>
    <div class="body">
      <div class="eyebrow">__EYEBROW__</div>
      __STATBLOCK__
      <div class="headline">__HEADLINE__</div>
    </div>
    <div class="footer">
      <div class="name">Fantasy Tier<small>Premier League fantasy</small></div>
      <div class="cta">Build your team &rarr;</div>
    </div>
  </div>
</div></body></html>
