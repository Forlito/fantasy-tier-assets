<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Saira+Condensed:ital,wght@0,700;0,800;0,900;1,800;1,900&family=Manrope:wght@500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
.card{position:relative;width:1080px;height:1080px;overflow:hidden;color:#FAFAF7;font-family:'Manrope',sans-serif;
  background:
    radial-gradient(900px 620px at 82% 6%, rgba(255,169,77,.24), transparent 60%),
    radial-gradient(720px 720px at 10% 94%, rgba(40,215,198,.13), transparent 60%),
    #06070A;}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;display:none;}
.scrim{position:absolute;inset:0;z-index:1;display:none;}
.ring{position:absolute;right:-170px;top:-170px;width:640px;height:640px;border-radius:50%;
  background:radial-gradient(circle at 50% 50%, rgba(255,169,77,.42), rgba(255,146,43,.12) 46%, transparent 62%);z-index:2;pointer-events:none;}
.top{position:absolute;top:54px;left:64px;right:64px;display:flex;align-items:center;justify-content:space-between;z-index:6;}
.brand{display:flex;align-items:center;gap:15px;}
.brand svg{height:46px;width:46px;} .brand svg path{fill:#FAFAF7;}
.brand .wm{font-family:'Saira Condensed';font-weight:900;font-style:italic;text-transform:uppercase;font-size:30px;letter-spacing:.01em;}
.tag{font-family:'Saira Condensed';font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.12em;font-size:20px;color:#06070A;background:#FFC53D;padding:9px 18px;border-radius:8px;}
.player{position:absolute;right:0;top:0;bottom:0;width:60%;height:100%;object-fit:cover;object-position:center top;z-index:3;
  -webkit-mask-image:linear-gradient(90deg,transparent 0%,#000 42%);mask-image:linear-gradient(90deg,transparent 0%,#000 42%);}
/* content blocks (solo se muestra el del layout activo) */
.content{position:absolute;left:64px;bottom:150px;z-index:6;max-width:600px;display:none;}
.card.layout-stat  .c-stat  {display:block;}
.card.layout-money .c-stat  {display:block;}
.card.layout-money .stat{color:#FFC53D;}
.card.layout-money .stat .u{color:#FAFAF7;}
.card.layout-versus .c-versus{display:block;max-width:900px;}
.card.layout-ranking .c-ranking{display:block;max-width:820px;}
.card.layout-fact  .c-fact  {display:block;max-width:760px;}
.kicker{font-family:'Saira Condensed';font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.13em;color:#28D7C6;font-size:26px;margin-bottom:10px;min-height:1px;}
.stat{font-family:'Saira Condensed';font-weight:900;font-style:italic;line-height:.80;font-size:196px;text-shadow:0 6px 40px rgba(0,0,0,.45);}
.stat .u{font-size:60px;color:#FFA94D;margin-left:12px;}
.headline{font-family:'Saira Condensed';font-weight:900;font-style:italic;text-transform:uppercase;font-size:72px;line-height:.92;margin-top:8px;text-shadow:0 4px 30px rgba(0,0,0,.5);}
.subline{font-family:'Manrope';font-weight:600;color:#C7CBD3;font-size:26px;margin-top:16px;max-width:42ch;line-height:1.4;}
/* versus */
.vs-home,.vs-away{font-family:'Saira Condensed';font-weight:900;font-style:italic;text-transform:uppercase;font-size:120px;line-height:.84;text-shadow:0 4px 30px rgba(0,0,0,.55);}
.vs-sep{font-family:'Saira Condensed';font-weight:800;font-style:italic;text-transform:uppercase;color:#FFA94D;font-size:46px;margin:8px 0;}
/* ranking */
.rank-list{margin-top:16px;}
.rrow{display:flex;align-items:center;gap:22px;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.11);}
.rrow:last-child{border-bottom:none;}
.rn{font-family:'Saira Condensed';font-weight:900;font-style:italic;color:#FFA94D;font-size:50px;width:58px;text-align:center;}
.rname{font-family:'Saira Condensed';font-weight:800;font-style:italic;text-transform:uppercase;font-size:50px;flex:1;}
.rval{font-family:'Saira Condensed';font-weight:900;font-style:italic;color:#28D7C6;font-size:50px;}
/* fact */
.headline.big{font-size:112px;line-height:.90;}
/* CTA + footer */
.cta{position:absolute;left:64px;bottom:62px;z-index:6;display:inline-flex;align-items:center;gap:10px;
  font-family:'Saira Condensed';font-weight:900;font-style:italic;text-transform:uppercase;font-size:26px;color:#06070A;background:#FFC53D;padding:15px 30px;border-radius:12px;}
.foot{position:absolute;right:64px;bottom:72px;z-index:6;text-align:right;font-family:'Saira Condensed';font-weight:800;font-style:italic;text-transform:uppercase;font-size:24px;opacity:.92;}
.foot small{display:block;font-family:'Manrope';font-weight:600;text-transform:none;color:#9AA0AD;font-size:16px;margin-top:2px;}
/* ── DATA MODE (foto de estadio de fondo) ── */
.card.mode-data .bg{display:block;}
.card.mode-data .scrim{display:block;background:
  linear-gradient(180deg, rgba(6,7,10,.45) 0%, rgba(6,7,10,.80) 60%, rgba(6,7,10,.97) 100%),
  linear-gradient(90deg, rgba(6,7,10,.85) 0%, rgba(6,7,10,.30) 55%, rgba(6,7,10,.10) 100%);}
.card.mode-data .player{display:none;}
.card.mode-data.layout-stat .stat,.card.mode-data.layout-money .stat{font-size:236px;}
.card.mode-data.layout-stat .headline,.card.mode-data.layout-money .headline{font-size:86px;max-width:15ch;}
</style></head>
<body>
<div class="card __MODECLASS__ __LAYOUT__">
  <img class="bg" src="__BGURL__" alt="">
  <div class="scrim"></div>
  <div class="ring"></div>
  <div class="top">
    <div class="brand">

      </svg>
      <span class="wm">Fantasy Tier</span>
    </div>
    <span class="tag">__EYEBROW__</span>
  </div>
  <img class="player" src="__PLAYERURL__" alt="">

  <div class="content c-stat">
    <div class="kicker">__KICKER__</div>
    __STATBLOCK__
    <div class="headline">__HEADLINE__</div>
    <div class="subline">__SUBLINE__</div>
  </div>

  <div class="content c-versus">
    <div class="kicker">__KICKER__</div>
    <div class="vs-home">__HOME__</div>
    <div class="vs-sep">vs</div>
    <div class="vs-away">__AWAY__</div>
    <div class="subline">__VSMETA__</div>
  </div>

  <div class="content c-ranking">
    <div class="kicker">__RANKTITLE__</div>
    <div class="rank-list">__RANKINGROWS__</div>
  </div>

  <div class="content c-fact">
    <div class="kicker">__KICKER__</div>
    <div class="headline big">__HEADLINE__</div>
    <div class="subline">__SUBLINE__</div>
  </div>

  <div class="cta">Build your team →</div>
  <div class="foot">Fantasy Tier<small>Premier League fantasy</small></div>
</div>
</body></html>
